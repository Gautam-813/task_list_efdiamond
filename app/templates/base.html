<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "Shared Tasks" }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/styles.css" rel="stylesheet">
</head>
<body>
  {% if current_user %}
  <nav class="navbar navbar-expand-lg app-nav">
    <div class="container-fluid px-3 px-lg-4">
      <a class="navbar-brand" href="/tasks">Shared Tasks</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="topNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="/tasks">Tasks</a></li>
          {% if current_user.role == "admin" %}
          <li class="nav-item"><a class="nav-link" href="/admin/users">Users</a></li>
          <li class="nav-item"><a class="nav-link" href="/reports">Reports</a></li>
          {% endif %}
        </ul>
        <div class="d-flex align-items-center gap-3">
          <span class="user-pill">{{ current_user.full_name }}</span>
          <form method="post" action="/logout" class="m-0">
            <input type="hidden" name="csrf_token" value="{{ request.cookies.get('csrf_token', '') }}">
            <button class="btn btn-sm btn-outline-secondary">Logout</button>
          </form>
        </div>
      </div>
    </div>
  </nav>
  {% endif %}
  <main class="{% if current_user %}app-shell{% else %}auth-shell{% endif %}">
    {% block content %}{% endblock %}
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
