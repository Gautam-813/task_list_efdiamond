{% extends "base.html" %}
{% set title = "Change Password" %}
{% block content %}
<div class="page-head">
  <div>
    <p class="eyebrow">Profile</p>
    <h1>Change password</h1>
  </div>
  <a class="btn btn-outline-secondary" href="/tasks">Back</a>
</div>

<section class="form-surface" style="max-width: 460px;">
  <h2>Update your password</h2>
  {% if error %}
  <div class="alert alert-danger">{{ error }}</div>
  {% endif %}
  {% if success %}
  <div class="alert alert-success">{{ success }}</div>
  {% endif %}
  <form method="post" action="/profile/change-password" class="vstack gap-3">
    <input type="hidden" name="csrf_token" value="{{ request.cookies.get('csrf_token', '') }}">
    <div>
      <label class="form-label">Current Password</label>
      <input type="password" name="current_password" class="form-control" required>
    </div>
    <div>
      <label class="form-label">New Password</label>
      <input type="password" name="new_password" class="form-control" required minlength="6">
    </div>
    <div>
      <label class="form-label">Confirm New Password</label>
      <input type="password" name="confirm_password" class="form-control" required minlength="6">
    </div>
    <hr>
    <div>
      <label class="form-label">Phone Number</label>
      <input name="phone_number" class="form-control" value="{{ current_user.phone_number or '' }}" placeholder="+919876543210">
    </div>
    <button class="btn btn-dark">Save Changes</button>
  </form>
</section>
{% endblock %}
