{% extends "base.html" %}
{% set title = "Edit User" %}
{% block content %}
<div class="page-head">
  <div>
    <p class="eyebrow">Admin</p>
    <h1>{{ edit_user.full_name }}</h1>
  </div>
  <a class="btn btn-outline-secondary" href="/admin/users">Back to Users</a>
</div>

<section class="form-surface" style="max-width: 520px;">
  <h2>Edit user details</h2>
  {% if error %}
  <div class="alert alert-danger">{{ error }}</div>
  {% endif %}
  {% if success %}
  <div class="alert alert-success">{{ success }}</div>
  {% endif %}
  <form method="post" action="/admin/users/{{ edit_user.id }}/edit" class="vstack gap-3">
    <input type="hidden" name="csrf_token" value="{{ request.cookies.get('csrf_token', '') }}">
    <div>
      <label class="form-label">Username</label>
      <input class="form-control" value="{{ edit_user.username }}" disabled>
    </div>
    <div>
      <label class="form-label">Full Name</label>
      <input name="full_name" class="form-control" value="{{ edit_user.full_name }}" required>
    </div>
    <div>
      <label class="form-label">Phone Number</label>
      <input name="phone_number" class="form-control" value="{{ edit_user.phone_number or '' }}" placeholder="+919876543210">
      <div class="form-text">E.164 format with country code</div>
    </div>
    <div>
      <label class="form-label">Role</label>
      <select name="role" class="form-select">
        <option value="user" {% if edit_user.role == "user" %}selected{% endif %}>User</option>
        <option value="admin" {% if edit_user.role == "admin" %}selected{% endif %}>Admin</option>
      </select>
    </div>
    <div class="form-check">
      <input class="form-check-input" type="checkbox" name="is_active" id="activeUser" {% if edit_user.is_active %}checked{% endif %}>
      <label class="form-check-label" for="activeUser">Active</label>
    </div>
    <hr>
    <div>
      <label class="form-label">Reset Password</label>
      <input type="password" name="new_password" class="form-control" placeholder="Leave blank to keep current" minlength="6">
    </div>
    <button class="btn btn-dark">Save Changes</button>
  </form>
</section>
{% endblock %}
